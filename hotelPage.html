<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/favicon-light.svg" type="image/x-icon" media="(prefers-color-scheme: light)">
    <link rel="shortcut icon" href="assets/img/favicon.svg" type="image/x-icon" media="(prefers-color-scheme: dark)">
    <title>Nomadi</title>

    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript" src="assets/script/DOM_search-bar.js" defer></script>
    <script type="text/javascript" src="assets/script/DOM_footer.js" defer></script>
    <script type="text/javascript" src="assets/script/sendCookie.js"></script>
    <script type="text/javascript" src="assets/script/searchHotel.js" defer></script>
    <script type="text/javascript" src="assets/script/modal.js" defer></script>
    <script type="text/javascript" src="assets/script/verifyLog.js" defer></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/style/reset.css">
    <link rel="stylesheet" href="assets/style/globalSettings.css">
    <link rel="stylesheet" href="assets/style/searchBarSettings.css">
    <link rel="stylesheet" href="assets/style/hotelPage.css">
    <link rel="stylesheet" href="assets/style/loading.css">
    <link rel="stylesheet" href="assets/style/modal.css">
</head>
<body>
    <header>
        <a href="index.html"><i class="bi bi-arrow-bar-left icon"></i></a>
        <button id="open-modal"><i class="bi bi-person-circle icon"></i><span class="username">login</span></button>
        <div class="login-menu-container">
            <button onclick="myTravels()"><p>my travels</p></button><hr>
            <button onclick="reservedPage()"><p>my account</p></button><hr>
            <button onclick="logout()"><p>log out</p></button>
        </div>
    </header>

    <main>
        <div class="loader"></div>
        <div class="search-container">
            <form class="search-bar-form" method="post" autocomplete="off"></form>
        </div>

        <div class="filters-container">
            <p>Filters by:</p>

            <label for="popularity">
                <input type="radio" id="popularity" value="popularity" name="radioGroup" checked>
                <span class="radio-indicator">
                    <p>popularity</p>
                    <i class="bi bi-people icon-smaller"></i>
                </span> 
            </label>
            <label for="price">
                <input type="radio" id="price" value="price" name="radioGroup">
                <span class="radio-indicator">
                    <p>price</p>
                    <i class="bi bi-currency-exchange icon-smaller"></i>
                </span>
            </label>
            <label for="distance">
                <input type="radio" id="distance" value="distance" name="radioGroup">
                <span class="radio-indicator">
                    <p>distance</p>
                    <i class="bi bi-map icon-smaller"></i>
                </span>
            </label>
        </div>

        <div class="hotels-container"></div>
    </main>

    <footer></footer>

    <modal></modal>

</body>
</html>
